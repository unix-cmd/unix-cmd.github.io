<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Mediasida</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .gallery img, .gallery video {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .gallery-item {
            flex: 1 1 calc(33.333% - 20px);
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <header>
        <h1>Min Mediasida</h1>
    </header>
    <div class="container">
        <h2>Bilder</h2>
        <div class="gallery">
            <div class="gallery-item">
                <img src="bild1.jpg" alt="Beskrivning av bild 1">
            </div>
            <div class="gallery-item">
                <img src="bild2.jpg" alt="Beskrivning av bild 2">
            </div>
            <!-- Lägg till fler bilder här -->
        </div>

        <h2>Videos</h2>
        <div class="gallery">
            <div class="gallery-item">
                <video controls>
                    <source src="video1.mp4" type="video/mp4">
                    Din webbläsare stöder inte videon.
                </video>
            </div>
            <div class="gallery-item">
                <video controls>
                    <source src="video2.mp4" type="video/mp4">
                    Din webbläsare stöder inte videon.
                </video>
            </div>
            <!-- Lägg till fler videos här -->
        </div>
    </div>
</body>
</html>
